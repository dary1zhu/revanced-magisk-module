[main]
enable-module-update = true
parallel-jobs = 1
remove-rv-integrations-checks = false

patches-version = "dev"
cli-version = "dev"
cli-source = "MorpheApp/morphe-cli"

[Instagram]
enabled = true
rv-brand = "Piko"
patches-source = "crimera/piko"
app-name = "Instagram"
build-mode = "both"
arch = "arm64-v8a"
version = "425.0.0.0.0"
include-stock = true
excluded-patches = ["Change-version-code"]
direct-dlurl = "https://github.com/dary1zhu/revanced-magisk-module/releases/download/Prebuilts/com.instagram.android-v425.apk"
module-prop-name = "piko-instagram"

[YouTube]
enabled = true
rv-brand = "Morphe"
patches-source = "MorpheApp/morphe-patches"
app-name = "YouTube"
pkg-name = "com.google.android.youtube"
build-mode = "both"
arch = "arm64-v8a"
version = "19.15.282" 
include-stock = true
direct-dlurl = "https://github.com/dary1zhu/revanced-magisk-module/releases/download/Prebuilts/com.google.android.youtube-v21.15.282.apk"
module-prop-name = "morphe-youtube"

[YouTube-Music]
enabled = true
rv-brand = "Morphe"
patches-source = "MorpheApp/morphe-patches"
app-name = "YouTube Music"
pkg-name = "com.google.android.apps.youtube.music"
build-mode = "both"
arch = "arm64-v8a"
version = "9.13.50"
include-stock = true
# 填入你下载好的 YTMusic 合并版地址
direct-dlurl = "https://github.com/dary1zhu/revanced-magisk-module/releases/download/Prebuilts/com.google.android.apps.youtube.music-v9.13.50.apk"
module-prop-name = "morphe-youtubemusic"
