[main]
enable-module-update = true
parallel-jobs = 1
remove-rv-integrations-checks = false

cli-version = "dev"
cli-source = "MorpheApp/morphe-cli"

[Instagram]
enabled = false
rv-brand = "Piko"
patches-source = "crimera/piko"
patches-version = "dev"
app-name = "Instagram"
pkg-name = "com.instagram.android"
build-mode = "both"
arch = "arm64-v8a"
version = "424.0.0.49.64"
include-stock = true
excluded-patches = ["Change version code"]
direct-dlurl = "https://github.com/dary1zhu/revanced-magisk-module/releases/download/Prebuilts/com.instagram.android-v424.apk"
module-prop-name = "piko-instagram"

[Reddit]
enabled = true
rv-brand = "Morphe"
patches-source = "MorpheApp/morphe-patches"
patches-version = "dev"
app-name = "Reddit"
pkg-name = "com.reddit.frontpage"
build-mode = "both"
arch = "arm64-v8a"
version = "2026.15.1"  # 请根据你要下载的 APK 版本修改
include-stock = true
# 建议先去下载好对应的原版 APK 传到你的 Prebuilts 仓库
direct-dlurl = "https://github.com/dary1zhu/revanced-magisk-module/releases/download/Prebuilts/com.reddit.frontpage-v2026.15.1.apk"
module-prop-name = "morphe-reddit"

[YouTube]
enabled = false
rv-brand = "Morphe"
patches-source = "MorpheApp/morphe-patches"
patches-version = "dev"
app-name = "YouTube"
pkg-name = "com.google.android.youtube"
build-mode = "both"
arch = "arm64-v8a"
version = "21.15.282" 
include-stock = true
direct-dlurl = "https://github.com/dary1zhu/revanced-magisk-module/releases/download/Prebuilts/com.google.android.youtube-v21.15.282.apk"
module-prop-name = "morphe-youtube"

[YouTube-Music]
